<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F4E6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a6fa8;stop-opacity:1" />
